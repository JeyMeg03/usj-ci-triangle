<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Numeral Converter</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 350px;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
    }

    input, select, button {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        background: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    .result {
        margin-top: 15px;
        font-weight: bold;
        font-size: 18px;
    }

    .error {
        color: red;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Roman Numeral Converter</h1>

    <select id="conversionType">
        <option value="intToRoman">Integer → Roman</option>
        <option value="romanToInt">Roman → Integer</option>
    </select>

    <input type="text" id="inputValue" placeholder="Enter value">

    <button onclick="convert()">Convert</button>

    <div class="result" id="result"></div>
    <div class="error" id="error"></div>
</div>

<script>
function intToRoman(num) {
    const map = [
        [1000, "M"], [900, "CM"], [500, "D"], [400, "CD"],
        [100, "C"], [90, "XC"], [50, "L"], [40, "XL"],
        [10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]
    ];

    let result = "";

    for (let [value, symbol] of map) {
        while (num >= value) {
            result += symbol;
            num -= value;
        }
    }

    return result;
}

function romanToInt(str) {
    const map = {
        I: 1, V: 5, X: 10,
        L: 50, C: 100,
        D: 500, M: 1000
    };

    let total = 0;

    for (let i = 0; i < str.length; i++) {
        const current = map[str[i]];
        const next = map[str[i + 1]];

        if (!current) return null;

        if (next && current < next) {
            total -= current;
        } else {
            total += current;
        }
    }

    return total;
}

function isValidRoman(str) {
    const regex = /^(M{0,3})(CM|CD|D?C{0,3})(XC|XL|L?X{0,3})(IX|IV|V?I{0,3})$/;
    return regex.test(str);
}

function convert() {
    const type = document.getElementById("conversionType").value;
    const input = document.getElementById("inputValue").value.trim();
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");

    resultDiv.textContent = "";
    errorDiv.textContent = "";

    if (type === "intToRoman") {
        const num = parseInt(input);

        if (isNaN(num) || num < 1 || num > 3999) {
            errorDiv.textContent = "Please enter a valid integer between 1 and 3999.";
            return;
        }

        resultDiv.textContent = intToRoman(num);
    } 
    else {
        const upperInput = input.toUpperCase();

        if (!isValidRoman(upperInput)) {
            errorDiv.textContent = "Please enter a valid Roman numeral.";
            return;
        }

        resultDiv.textContent = romanToInt(upperInput);
    }
}
</script>

</body>
</html>
